<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Pediment (triangular roof) -->
  <polygon points="16,3 4,12 28,12" />
  <!-- Entablature (horizontal bar under roof) -->
  <rect x="5" y="12" width="22" height="2" />
  <!-- Columns -->
  <line x1="8" y1="14" x2="8" y2="25" />
  <line x1="13" y1="14" x2="13" y2="25" />
  <line x1="19" y1="14" x2="19" y2="25" />
  <line x1="24" y1="14" x2="24" y2="25" />
  <!-- Base -->
  <rect x="4" y="25" width="24" height="2" />
  <!-- Steps -->
  <line x1="2" y1="29" x2="30" y2="29" />
  <line x1="3" y1="27" x2="29" y2="27" />
</svg>
